name: Job Scraper

on:
  schedule:
    - cron: '0 11 * * *'   # 08:00 BRT (UTC-3)
    - cron: '0 21 * * *'   # 18:00 BRT (UTC-3)
  workflow_dispatch:         # permite disparo manual para teste

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name "VagasBot"
          git config user.email "vagas-bot@github-actions"
          git add data/seen_jobs.json
          git diff --staged --quiet || git commit -m "chore: update seen jobs [skip ci]"
          git push
